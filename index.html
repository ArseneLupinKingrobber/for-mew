<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ง้อหมิว 💖</title>

<style>
body {
    margin: 0;
    padding: 0;
    background: linear-gradient(135deg, #ff758c, #ff7eb3);
    font-family: "Segoe UI", sans-serif;
    text-align: center;
    overflow: hidden;
    color: white;
}

.container {
    margin-top: 12%;
}

h1 {
    font-size: 3rem;
    animation: pulse 1.5s infinite;
}

p {
    font-size: 1.3rem;
    margin: 20px;
}

button {
    padding: 15px 30px;
    font-size: 1.2rem;
    border: none;
    border-radius: 30px;
    cursor: pointer;
    margin: 10px;
    transition: 0.3s;
}

.yes {
    background-color: #ff2e63;
    color: white;
}

.yes:hover {
    background-color: #ff004c;
    transform: scale(1.1);
}

.no {
    background-color: white;
    color: #ff2e63;
    position: absolute;
}

@keyframes pulse {
    0% { transform: scale(1); }
    50% { transform: scale(1.1); }
    100% { transform: scale(1); }
}

.heart {
    position: absolute;
    font-size: 20px;
    animation: float 4s linear infinite;
}

@keyframes float {
    from { transform: translateY(100vh); opacity: 1; }
    to { transform: translateY(-10vh); opacity: 0; }
}
</style>
</head>

<body>

<div class="container">
    <h1>หมิว เค้าขอโทษนะ 💔</h1>
    <p>
        เค้ารู้ว่าทำให้หมิวเสียใจ<br>
        เค้าจะปรับปรุงตัวจริง ๆ 🥺<br>
        ดีกันนะคนดี 💖
    </p>

    <button class="yes" onclick="forgive()">ให้อภัย ❤️</button>
    <button class="no" onmouseover="moveButton(this)">ไม่ให้อภัย 😜</button>

    <div id="player" style="margin-top:30px;"></div>
</div>

<script>
function forgive() {
    document.getElementById("player").innerHTML = `
        <iframe width="0" height="0"
        src="https://www.youtube.com/embed/0-hPRE6-muU?autoplay=1&loop=1&playlist=0-hPRE6-muU"
        frameborder="0"
        allow="autoplay">
        </iframe>`;
    alert("เย้~ หมิวน่ารักที่สุดเลย 💖");
}

function moveButton(button) {
    const x = Math.random() * (window.innerWidth - 100);
    const y = Math.random() * (window.innerHeight - 50);
    button.style.left = x + "px";
    button.style.top = y + "px";
}

setInterval(() => {
    const heart = document.createElement("div");
    heart.classList.add("heart");
    heart.innerHTML = "💖";
    heart.style.left = Math.random() * 100 + "vw";
    heart.style.fontSize = Math.random() * 20 + 10 + "px";
    document.body.appendChild(heart);

    setTimeout(() => {
        heart.remove();
    }, 4000);
}, 300);
</script>

</body>
</html>
